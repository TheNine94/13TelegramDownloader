name: TelegramChannelDownloader

on:
  workflow_dispatch:
    inputs:
      telegram_channel:
        description: "Telegram channel link"
        required: true
        type: string
      split_threshold_mb:
        description: "Max size per part (MB) | 0 = disable"
        required: false
        type: number
        default: 90

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq zip openssl

      - name: Detect last post id
        id: lastpost
        run: |
          CHANNEL="${{ github.event.inputs.telegram_channel }}"
          
          echo "Checking channel..."
          
          HTML=$(curl -s "$CHANNEL")
          
          LAST=$(echo "$HTML" | grep -o 'data-post="[^"]*"' | tail -1 | sed 's/.*\///;s/"//')
          
          if [ -z "$LAST" ]; then
            echo "Failed to detect last post"
            exit 1
          fi
          
          echo "Last post id: $LAST"
          
          echo "last_post=$LAST" >> $GITHUB_OUTPUT

      - name: Download channel posts
        id: download
        run: |

          BASE="${{ github.event.inputs.telegram_channel }}"
          LAST="${{ steps.lastpost.outputs.last_post }}"

          mkdir -p downloads

          echo "Downloading posts 1 → $LAST"

          for (( i=1; i<=LAST; i++ ))
          do
            LINK="$BASE/$i"
            
            echo "Processing $LINK"
            
            RESPONSE=$(curl -s -X POST \
              -H "User-Agent: Mozilla/5.0" \
              -d "telegram_link=$LINK" \
              https://telegramdownloader.net/proxy.php)

            RAW_URL=$(echo "$RESPONSE" | jq -r '.data.data.link')
            FILE_NAME=$(echo "$RESPONSE" | jq -r '.data.data.file_name')

            if [ -z "$RAW_URL" ] || [ "$RAW_URL" = "null" ]; then
              echo "No file in post $i"
              continue
            fi

            CORRECTED_URL=$(echo "$RAW_URL" | sed 's/%20/-/g' | sed 's/ /-/g')

            BASE_NAME="${FILE_NAME%.*}"
            EXT="${FILE_NAME##*.}"

            FINAL_NAME="$FILE_NAME"
            COUNT=1

            while [ -f "downloads/$FINAL_NAME" ]; do
              FINAL_NAME="${BASE_NAME}_${COUNT}.${EXT}"
              COUNT=$((COUNT+1))
            done

            echo "Downloading $FINAL_NAME"

            curl -L \
              --retry 5 \
              --retry-delay 5 \
              -o "downloads/$FINAL_NAME" \
              "$CORRECTED_URL"

          done

      - name: Split large files
        if: github.event.inputs.split_threshold_mb != '0'
        run: |
          THRESHOLD="${{ github.event.inputs.split_threshold_mb }}"
          LIMIT=$((THRESHOLD * 1024 * 1024))

          cd downloads

          for file in *; do
            [ -f "$file" ] || continue

            SIZE=$(stat -c%s "$file")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "Splitting $file"
              zip -s "${THRESHOLD}m" "$file.zip" "$file"
              rm "$file"
            fi
          done

          cd ..

      - name: Clean filenames
        run: |
          cd downloads

          for file in *; do
            [ -e "$file" ] || continue

            EXT="${file##*.}"

            if [[ "$file" =~ [^[:ascii:]] ]]; then
              NEW=$(openssl rand -hex 8).$EXT
              mv "$file" "$NEW"
            else
              CLEAN=$(echo "$file" | sed 's/[^a-zA-Z0-9._-]/_/g')
              mv "$file" "$CLEAN"
            fi
          done

          cd ..

      - name: Upload files to repo
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          for file in downloads/*; do
            [ -f "$file" ] || continue

            git add "$file"
            git commit -m "Add $(basename "$file") [skip ci]" || true
            git push
          done

      - name: Final report
        run: |
          echo "Download finished"
          ls -lh downloads
