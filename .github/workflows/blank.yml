name: Telegram Channel Downloader

on:
  workflow_dispatch:
    inputs:
      telegram_channel:
        description: "Telegram channel link or username"
        required: true
        type: string
      split_threshold_mb:
        description: "Max size per part (MB) | 0 = disable"
        required: false
        default: 90
        type: number

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq zip openssl

      - name: 🔍 Detect channel & last post
        id: detect
        run: |
          set -e

          INPUT="${{ github.event.inputs.telegram_channel }}"

          CHANNEL=$(echo "$INPUT" \
            | sed -E 's#https?://t\.me/(s/)?##' \
            | sed 's#/.*##' \
            | tr -d '@')

          if [ -z "$CHANNEL" ]; then
            echo "❌ Invalid channel input"
            exit 1
          fi

          echo "✅ Channel: $CHANNEL"

          URL="https://t.me/s/$CHANNEL"
          HTML=$(curl -fsSL -H "User-Agent: Mozilla/5.0" "$URL")

          LAST=$(echo "$HTML" \
            | grep -oE 'data-post="'"$CHANNEL"'/[0-9]+"' \
            | tail -1 \
            | sed -E 's#.*\/([0-9]+)"#\1#')

          if [ -z "$LAST" ]; then
            echo "❌ Failed to detect last post (private or restricted channel)"
            exit 1
          fi

          echo "✅ Last post ID: $LAST"

          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "last_post=$LAST" >> $GITHUB_OUTPUT

      - name: ⬇️ Download all posts
        run: |
          set -e

          CHANNEL="${{ steps.detect.outputs.channel }}"
          LAST="${{ steps.detect.outputs.last_post }}"
          BASE="https://t.me/$CHANNEL"

          mkdir -p downloads

          for ((i=1; i<=LAST; i++)); do
            POST="$BASE/$i"
            echo "➡️ $POST"

            RESPONSE=$(curl -s -X POST \
              -H "User-Agent: Mozilla/5.0" \
              -d "telegram_link=$POST" \
              https://telegramdownloader.net/proxy.php)

            URL=$(echo "$RESPONSE" | jq -r '.data.data.link')
            NAME=$(echo "$RESPONSE" | jq -r '.data.data.file_name')

            if [ -z "$URL" ] || [ "$URL" = "null" ]; then
              echo "   ⏭️ No file"
              continue
            fi

            URL=$(echo "$URL" | sed 's/%20/-/g;s/ /-/g')

            BASE_NAME="${NAME%.*}"
            EXT="${NAME##*.}"
            FINAL="$NAME"
            N=1

            while [ -f "downloads/$FINAL" ]; do
              FINAL="${BASE_NAME}_$N.$EXT"
              N=$((N+1))
            done

            echo "   ⬇️ Downloading $FINAL"

            curl -L \
              --retry 5 \
              --retry-delay 5 \
              -o "downloads/$FINAL" \
              "$URL"
          done

      - name: ✂️ Split large files
        if: github.event.inputs.split_threshold_mb != '0'
        run: |
          LIMIT=$(( ${{ github.event.inputs.split_threshold_mb }} * 1024 * 1024 ))
          cd downloads

          for f in *; do
            [ -f "$f" ] || continue
            SIZE=$(stat -c%s "$f")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ Splitting $f"
              zip -s "${{ github.event.inputs.split_threshold_mb }}m" "$f.zip" "$f"
              rm "$f"
            fi
          done
          cd ..

      - name: 🧹 Clean filenames
        run: |
          cd downloads
          for f in *; do
            [ -e "$f" ] || continue
            EXT="${f##*.}"

            if [[ "$f" =~ [^[:ascii:]] ]]; then
              NEW=$(openssl rand -hex 8).$EXT
              mv "$f" "$NEW"
            else
              CLEAN=$(echo "$f" | sed 's/[^a-zA-Z0-9._-]/_/g')
              mv "$f" "$CLEAN"
            fi
          done
          cd ..

      - name: 📤 Upload to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          for f in downloads/*; do
            [ -f "$f" ] || continue
            git add "$f"
            git commit -m "Add $(basename "$f") [skip ci]" || true
            git push
          done

      - name: ✅ Final report
        run: |
          echo "🎉 Done"
          ls -lh downloads
